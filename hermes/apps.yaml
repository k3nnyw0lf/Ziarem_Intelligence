# Ziarem app manifest — every product housed in the single Supabase project
# (ref: sfelhasepvaoianyuvxe). Hermes uses this to route a question to the
# right table prefix. Add a new entry when you spin up a new app.
#
# Schema:
#   <slug>:
#     name:        human-readable
#     prefix:      table prefix in public.* (without trailing _)
#     vertical:    real-estate | mortgage | insurance | title | credit | health | ops | creator | other
#     anchor:      true if it triggers cross-sells per ziarem-soul.md
#     notes:       free-form one-liner

vault:
  name: "VAULT CRM"
  prefix: "vault"
  vertical: "ops"
  anchor: false
  notes: "Multi-business deal pipeline (insurance, mortgage, RE, credit, lending). 100+ vault_* tables."

