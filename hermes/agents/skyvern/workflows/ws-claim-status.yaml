# Skyvern workflow: daily sweep claim status across carrier portals.
# Triggered by hermes cron at 06:00 daily.
#
# Schema-verified against live Supabase:
#   ws_claims         id, claim_number, client_id, client_name, carrier_name,
#                     line_of_business, status, loss_date, loss_description,
#                     estimated_amount, paid_amount, adjuster_name,
#                     adjuster_phone, adjuster_email, notes, created_at,
#                     updated_at
#   carriers          id, name, short_code, portal_url, ...
#   ws_communications id, client_id, client_name, client_email, channel,
#                     direction, subject, body, status, template_id,
#                     language, created_at

title: "Wolf Insurance — daily claim status sweep"
description: |
  For every open ws_claims row (status NOT IN terminal states), pull the
  latest claim status + adjuster info from the carrier portal, update
  ws_claims, and append a ws_communications row whenever the status
  changes (so the client / agent see the change in their inbox).

steps:
  - name: open_claims
    type: sql
    query: |
      SELECT cl.id, cl.claim_number,
             cl.client_id, cl.client_name,
             cl.carrier_name,
             cl.status   AS prev_status,
             cl.notes    AS prev_notes,
             cl.line_of_business,
             c.id        AS carrier_id,
             c.short_code AS carrier_short_code,
             c.portal_url
      FROM ws_claims cl
      LEFT JOIN carriers c ON lower(c.name) = lower(cl.carrier_name)
      WHERE lower(cl.status) NOT IN ('closed','denied','withdrawn')
        AND c.portal_url IS NOT NULL
      ORDER BY cl.updated_at NULLS FIRST
      LIMIT 100

  - name: per_claim
    type: foreach
    over: "{{ open_claims.rows }}"
    do:
      - type: navigate
        url: "{{ item.portal_url }}/claims/{{ item.claim_number }}"
        auth_via: vault_api_configs
        auth_name: "carrier_{{ item.carrier_short_code or item.carrier_name }}"

      - type: extract
        schema:
          status:          { type: string, required: true }
          adjuster_name:   { type: string, required: false }
          adjuster_phone:  { type: string, required: false }
          adjuster_email:  { type: string, required: false }
          last_note:       { type: string, required: false }
          paid_amount:     { type: number, required: false }
          estimated_amount: { type: number, required: false }

      - type: sql
        query: |
          UPDATE ws_claims
          SET status            = {{ extract.status }},
              adjuster_name     = COALESCE({{ extract.adjuster_name }},  adjuster_name),
              adjuster_phone    = COALESCE({{ extract.adjuster_phone }}, adjuster_phone),
              adjuster_email    = COALESCE({{ extract.adjuster_email }}, adjuster_email),
              paid_amount       = COALESCE({{ extract.paid_amount }},    paid_amount),
              estimated_amount  = COALESCE({{ extract.estimated_amount }}, estimated_amount),
              notes = COALESCE(notes,'') ||
                      E'\n[' || to_char(now(),'YYYY-MM-DD') || '] '
                      || COALESCE({{ extract.last_note }}, ''),
              updated_at = now()
          WHERE id = {{ item.id }}

      - type: sql
        # Only post a comm row when status actually changed.
        condition: "{{ extract.status != item.prev_status }}"
        query: |
          INSERT INTO ws_communications
            (client_id, client_name,
             channel, direction,
             subject, body, status, language, created_at)
          VALUES
            ({{ item.client_id }}, {{ item.client_name }},
             'system', 'outbound',
             format('Claim %s status: %s → %s',
                    '{{ item.claim_number }}',
                    '{{ item.prev_status }}',
                    '{{ extract.status }}'),
             COALESCE({{ extract.last_note }}, ''),
             'queued', 'EN', now())

guards:
  - "Never modify a Closed/Denied/Withdrawn claim — read-only after terminal status."
  - "If the portal returns 'Claim not found', append a note to ws_claims.notes
     with the date + 'PORTAL_NOT_FOUND' and skip status update."
  - "Carrier portal credentials NEVER printed back into chat / logs."
