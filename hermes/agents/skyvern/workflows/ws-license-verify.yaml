# Skyvern workflow: quarterly verify producer licenses on each state DOI
# portal. Updates pro_licenses + appends to license_verification_logs.
#
# Schema-verified against live Supabase:
#   pro_licenses              id, user_id, license_number, license_state,
#                             license_category, is_primary, is_business_license,
#                             business_name, issuing_authority, issue_date,
#                             expiration_date, verification_status,
#                             verified_at, verified_via, verification_data,
#                             last_verification_attempt, notes,
#                             reminder_30_sent, reminder_60_sent,
#                             reminder_90_sent, created_at, updated_at
#   license_verification_logs id, license_id, user_id, api_used, status,
#                             cost_cents, request_data, response_data,
#                             error_message, created_at

title: "Wolf Insurance — quarterly producer license verification"
description: |
  For every pro_licenses row whose verified_at is older than 90 days,
  hit the relevant state DOI public lookup tool, confirm
  status + expiration, write back to pro_licenses.verification_status,
  log every check (success or fail) into license_verification_logs.

steps:
  - name: stale_licenses
    type: sql
    query: |
      SELECT id              AS license_id,
             user_id,
             license_number,
             license_state,
             license_category,
             business_name,
             expiration_date,
             verification_data,
             verified_at
      FROM pro_licenses
      WHERE COALESCE(verification_status, 'unverified') NOT IN ('expired','revoked')
        AND (verified_at IS NULL
             OR verified_at < now() - interval '90 days')
      ORDER BY verified_at NULLS FIRST
      LIMIT 50

  - name: per_license
    type: foreach
    over: "{{ stale_licenses.rows }}"
    do:
      # The state's public producer-lookup URL is per-state; the agent
      # picks the right URL. NPN (if known) lives in verification_data.
      - type: agent
        instruction: |
          Open the public producer-license lookup tool for the
          {{ item.license_state }} Department of Insurance. Search by NPN
          (extract from verification_data: {{ item.verification_data | tojson }})
          if available — otherwise by license number {{ item.license_number }}.
          This is a public lookup; no login required.

      - type: extract
        schema:
          status:          { type: string, required: true }   # active | inactive | expired | suspended
          expiration_date: { type: string, required: true }
          authorities:     { type: array, items: { type: string }, required: false }
          state_returned:  { type: string, required: false }
          raw_response:    { type: object, required: false }

      - type: sql
        query: |
          UPDATE pro_licenses
          SET verification_status      = lower({{ extract.status }}),
              expiration_date          = COALESCE({{ extract.expiration_date }}::date,
                                                  expiration_date),
              verified_at              = now(),
              verified_via             = 'skyvern_doi_lookup',
              last_verification_attempt = now(),
              verification_data        = jsonb_build_object(
                                            'authorities',  {{ extract.authorities | tojson }},
                                            'state_returned', {{ extract.state_returned }},
                                            'raw',          {{ extract.raw_response | tojson }})
                                          || COALESCE(verification_data, '{}'::jsonb)
          WHERE id = {{ item.license_id }}

      - type: sql
        query: |
          INSERT INTO license_verification_logs
            (license_id, user_id, api_used, status, request_data, response_data)
          VALUES
            ({{ item.license_id }}, {{ item.user_id }},
             'skyvern_doi_lookup',
             lower({{ extract.status }}),
             jsonb_build_object('license_number', {{ item.license_number }},
                                'state',          {{ item.license_state }}),
             {{ extract.raw_response | tojson }})

guards:
  - "Public DOI lookups only — never log into a producer-only DOI portal from this workflow."
  - "If the state DOI tool is down, write a license_verification_logs row
     with status='lookup_error', error_message=<reason>, but do NOT update
     pro_licenses.verification_status."
  - "If the lookup returns multiple matches, abort that license, log
     status='ambiguous_match', and flag for human review."
