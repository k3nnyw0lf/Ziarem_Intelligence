<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#a08520"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Shield/Vault icon -->
  <g transform="translate(10,10)">
    <!-- Outer shield -->
    <path d="M50 0 L95 15 L95 55 C95 80 75 95 50 100 C25 95 5 80 5 55 L5 15 Z" fill="url(#gold)" opacity="0.15" stroke="url(#gold)" stroke-width="2"/>
    <!-- Inner vault door circle -->
    <circle cx="50" cy="48" r="28" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <circle cx="50" cy="48" r="22" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
    <!-- Vault handle / spokes -->
    <line x1="50" y1="26" x2="50" y2="70" stroke="url(#gold)" stroke-width="1.5" opacity="0.7"/>
    <line x1="28" y1="48" x2="72" y2="48" stroke="url(#gold)" stroke-width="1.5" opacity="0.7"/>
    <line x1="34" y1="32" x2="66" y2="64" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <line x1="66" y1="32" x2="34" y2="64" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <!-- Center hub -->
    <circle cx="50" cy="48" r="6" fill="url(#gold)" opacity="0.9"/>
    <circle cx="50" cy="48" r="3" fill="#06060e"/>
    <!-- Lock pins -->
    <circle cx="50" cy="26" r="3" fill="url(#gold)" opacity="0.8"/>
    <circle cx="50" cy="70" r="3" fill="url(#gold)" opacity="0.8"/>
    <circle cx="28" cy="48" r="3" fill="url(#gold)" opacity="0.8"/>
    <circle cx="72" cy="48" r="3" fill="url(#gold)" opacity="0.8"/>
  </g>
  <!-- ZIAREM text -->
  <text x="120" y="55" font-family="'Bebas Neue', 'Arial Black', Impact, sans-serif" font-size="52" font-weight="700" fill="url(#gold)" letter-spacing="12">ZIAREM</text>
  <!-- Tagline -->
  <line x1="120" y1="68" x2="380" y2="68" stroke="url(#goldLight)" stroke-width="1"/>
  <text x="250" y="82" font-family="'Inter', Arial, sans-serif" font-size="8" fill="#888" letter-spacing="4" text-anchor="middle">ENTERPRISE SOLUTIONS GROUP</text>
  <!-- Bottom accent line -->
  <text x="250" y="98" font-family="'Inter', Arial, sans-serif" font-size="6.5" fill="#555" letter-spacing="2.5" text-anchor="middle">MORTGAGE  |  REAL ESTATE  |  CREDIT  |  INSURANCE  |  CONSTRUCTION</text>
</svg>