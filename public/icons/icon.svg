  <line x1="199" y1="199" x2="313" y2="313" stroke="#0f172a" stroke-width="5" opacity="0.4"/>
  <line x1="313" y1="199" x2="199" y2="313" stroke="#0f172a" stroke-width="5" opacity="0.4"/>
  <!-- Center knob -->
